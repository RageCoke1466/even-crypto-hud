name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting an improvement. Keep it focused so it is easier to discuss and build.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem or use case would this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Any other approaches you considered?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, sketches, links, or examples if helpful.
