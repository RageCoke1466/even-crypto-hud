name: Bug report
description: Report a reproducible problem.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug. Please include enough detail for someone else to reproduce it.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem and what you saw.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App version
      placeholder: "0.1.9"

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: Even app version, glasses model, phone OS, browser, or any other useful context.

  - type: textarea
    id: extra
    attributes:
      label: Logs or screenshots
      description: Add logs, screenshots, or other details if they help explain the issue.
